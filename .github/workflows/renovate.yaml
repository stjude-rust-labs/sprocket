name: Renovate

on:
  schedule:
    - cron: '0 13 * * 1' # 8 AM CDT / 7 AM CST Monday (1 PM UTC)
  pull_request:
    paths:
      - 'renovate.json'
      - '.github/workflows/renovate.yaml'
  workflow_dispatch:
    inputs:
      dryRun:
        description: 'Dry run (no PRs created)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  renovate:
    name: Renovate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate GitHub token
        if: github.event_name != 'pull_request'
        uses: actions/create-github-app-token@v1
        id: generate-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.16
        with:
          configurationFile: renovate.json
          token: ${{ steps.generate-token.outputs.token || github.token }}
        env:
          LOG_LEVEL: info
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_DRY_RUN: ${{ github.event_name == 'pull_request' && 'full' || (inputs.dryRun == 'true' && 'full' || '') }}
